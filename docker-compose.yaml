services:
  app:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - DATABASE_URL=${DATABASE_URL:-/data/rustymanager.db}
      - PORT=${PORT:-8080}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - JAAS_APP_ID=${JAAS_APP_ID:-}
      - JAAS_KEY_ID=${JAAS_KEY_ID:-}
      - JAAS_PRIVATE_KEY_BASE64=${JAAS_PRIVATE_KEY_BASE64:-}
      - UPLOADS_DIR=/data/uploads
    volumes:
      - db_data:/data
    user: appuser
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  db_data:
