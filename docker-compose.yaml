services:
  app:
    build: .
    expose:
      - "8080"
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN}
      - DATABASE_URL=${DATABASE_URL:-/data/rustymanager.db}
      - PORT=8080
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
    volumes:
      - db_data:/data

volumes:
  db_data:
