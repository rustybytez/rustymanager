{{ define "content" }}
<div class="flex flex-col items-center justify-center min-h-[60vh]">
  <div class="card bg-base-200 w-full max-w-sm shadow-md">
    <div class="card-body">
      <h2 class="card-title text-xl mb-1">Which project?</h2>
      <p class="text-sm text-base-content/60 mb-4">Select a project to continue.</p>
      <div class="flex flex-col gap-2">
        {{ range .Projects }}
        <form method="POST" action="/select-project">
          <input type="hidden" name="project_id" value="{{ .ID }}" />
          <button class="btn btn-outline w-full justify-start">{{ .Name }}</button>
        </form>
        {{ end }}
      </div>
      <div class="divider my-2"></div>
      <a href="/projects/new" class="btn btn-ghost btn-sm w-full">+ New project</a>
    </div>
  </div>
</div>
{{ end }}
