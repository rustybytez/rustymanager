{{ define "layout" }}<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rustymanager</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="navbar bg-base-200 shadow-sm mb-6">
    <div class="flex-1">
      <a href="/projects" class="btn btn-ghost text-xl">rustymanager</a>
    </div>
    <div class="flex-none gap-2 flex items-center">
      {{ if .CurrentUser }}
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn btn-ghost btn-sm gap-1">
          <span>{{ .CurrentUser.Name }}</span>
          <svg class="w-4 h-4 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </div>
        <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-50 w-44 p-2 shadow-lg border border-base-300">
          <li><a href="/settings">Settings</a></li>
        </ul>
      </div>
      {{ else }}
      <form method="POST" action="/logout">
        <button class="btn btn-ghost btn-sm">Logout</button>
      </form>
      {{ end }}
    </div>
  </div>
  <main class="container mx-auto px-4">
    {{ template "content" . }}
  </main>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>{{ end }}
