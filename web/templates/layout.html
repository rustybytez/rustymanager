{{ define "layout" }}<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>rustymanager</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="rustymanager" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <meta name="theme-color" content="#1d232a" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="navbar bg-base-200 shadow-sm mb-6">
    <div class="flex-1">
      <a href="/projects" class="btn btn-ghost text-xl">rustymanager</a>
    </div>
    <div class="flex-none gap-2 flex items-center">
      {{ if .CurrentUser }}
      <a href="/settings" class="btn btn-ghost btn-sm">{{ .CurrentUser.Name }}</a>
      {{ else }}
      <form method="POST" action="/logout">
        <button class="btn btn-ghost btn-sm">Logout</button>
      </form>
      {{ end }}
    </div>
  </div>
  <main class="container mx-auto px-4">
    {{ template "content" . }}
  </main>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>{{ end }}
