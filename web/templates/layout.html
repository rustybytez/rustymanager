{{ define "layout" }}<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>rustymanager</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="rustymanager" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <meta name="theme-color" content="#1d232a" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="navbar bg-base-200 shadow-sm mb-6">
    <div class="flex-1">
      {{ if .CurrentProject }}
      <a href="/projects/{{ .CurrentProject.ID }}" class="btn btn-ghost text-xl">{{ .CurrentProject.Name }}</a>
      {{ else }}
      <a href="/projects" class="btn btn-ghost text-xl">rustymanager</a>
      {{ end }}
    </div>
    <div class="flex-none gap-2 flex items-center">
      {{ if .CurrentProject }}
      <a href="/projects/{{ .CurrentProject.ID }}/edit" class="btn btn-ghost btn-sm btn-circle" title="Project settings">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </a>
      {{ end }}
      {{ if .CurrentUser }}
      <a href="/settings" class="btn btn-ghost btn-sm">{{ .CurrentUser.Name }}</a>
      {{ else }}
      <form method="POST" action="/logout">
        <button class="btn btn-ghost btn-sm">Logout</button>
      </form>
      {{ end }}
    </div>
  </div>
  <main class="container mx-auto px-4">
    {{ template "content" . }}
  </main>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' });
}
</script>
</body>
</html>{{ end }}
