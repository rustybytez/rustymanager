{{ define "content" }}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-6">New User</h1>
  <form method="POST" action="/users" class="flex flex-col gap-2">
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Name</legend>
      <input type="text" name="name" class="input w-full" required autofocus />
    </fieldset>
    <div class="flex gap-2 mt-2">
      <button type="submit" class="btn btn-primary">Create</button>
      <a href="/users" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{{ end }}
