{{ define "content" }}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-6">New Kanban Item</h1>
  <form method="POST" action="/projects/{{ .ProjectID }}/kanban" class="flex flex-col gap-2">
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Title</legend>
      <input type="text" name="title" class="input w-full" required autofocus />
    </fieldset>
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Assignee</legend>
      <select name="assignee_id" class="select w-full">
        <option value="">— unassigned —</option>
        {{ range .Users }}
        <option value="{{ .ID }}">{{ .Name }}</option>
        {{ end }}
      </select>
    </fieldset>
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Status</legend>
      <select name="status" class="select w-full">
        <option value="todo">To Do</option>
        <option value="in_progress">In Progress</option>
        <option value="done">Done</option>
      </select>
    </fieldset>
    <div class="flex gap-2 mt-2">
      <button type="submit" class="btn btn-primary">Add Item</button>
      <a href="/projects/{{ .ProjectID }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{{ end }}
