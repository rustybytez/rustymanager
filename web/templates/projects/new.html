{{ define "content" }}
<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold mb-4">New Project</h1>
  <form method="POST" action="/projects" class="flex flex-col gap-4">
    <div class="form-control">
      <label class="label"><span class="label-text">Name</span></label>
      <input type="text" name="name" class="input input-bordered" required />
    </div>
    <div class="form-control">
      <label class="label"><span class="label-text">Description</span></label>
      <textarea name="description" class="textarea textarea-bordered"></textarea>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="btn btn-primary">Create</button>
      <a href="/projects" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{{ end }}
