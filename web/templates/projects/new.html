{{ define "content" }}
<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold mb-4">New Project</h1>
  <form method="POST" action="/projects" class="flex flex-col gap-2">
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Name</legend>
      <input type="text" name="name" class="input w-full" required />
    </fieldset>
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Description</legend>
      <textarea name="description" class="textarea w-full"></textarea>
    </fieldset>
    <fieldset class="fieldset">
      <legend class="fieldset-legend">GitHub Repo</legend>
      <input type="text" name="github_repo" placeholder="owner/repo" class="input w-full" />
    </fieldset>
    <div class="flex gap-2 mt-2">
      <button type="submit" class="btn btn-primary">Create</button>
      <a href="/projects" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{{ end }}
