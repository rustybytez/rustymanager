{{ define "content" }}
<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold mb-4">Edit Project</h1>
  <form method="POST" action="/projects/{{ .Project.ID }}" class="flex flex-col gap-4">
    <div class="form-control">
      <label class="label"><span class="label-text">Name</span></label>
      <input type="text" name="name" value="{{ .Project.Name }}" class="input input-bordered" required />
    </div>
    <div class="form-control">
      <label class="label"><span class="label-text">Description</span></label>
      <textarea name="description" class="textarea textarea-bordered">{{ .Project.Description }}</textarea>
    </div>
    <div class="form-control">
      <label class="label"><span class="label-text">Status</span></label>
      <select name="status" class="select select-bordered">
        <option value="active"{{ if eq .Project.Status "active" }} selected{{ end }}>Active</option>
        <option value="archived"{{ if eq .Project.Status "archived" }} selected{{ end }}>Archived</option>
      </select>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="/projects/{{ .Project.ID }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{{ end }}
