{{ define "content" }}
<div class="max-w-lg mx-auto">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">{{ .Project.Name }}</h1>
    <span class="badge badge-outline">{{ .Project.Status }}</span>
  </div>
  <p class="mb-6 text-base-content/70">{{ .Project.Description }}</p>
  <p class="text-sm text-base-content/50 mb-6">Created {{ .Project.CreatedAt.Format "2006-01-02" }}</p>
  <div class="flex gap-2">
    <a href="/projects/{{ .Project.ID }}/edit" class="btn btn-primary">Edit</a>
    <a href="/projects" class="btn btn-ghost">Back</a>
  </div>
</div>
{{ end }}
